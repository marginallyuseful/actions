name: "Soll Checkout"
description: "Wraps actions/checkout@v6 with optional shallow-fetch deepening for soll. Outputs the base ref for soll affected --base."

inputs:
  # ── soll-specific ───────────────────────────────────────────────────
  checkout:
    description: "Run actions/checkout. Set to 'false' to skip the checkout step entirely (e.g. when using your own checkout)."
    required: false
    default: "true"
  soll:
    description: "Enable soll shallow-fetch deepening and base-ref resolution. Set to 'false' for a plain checkout."
    required: false
    default: "true"

  # ── actions/checkout@v6 passthrough ─────────────────────────────────
  repository:
    description: "Repository name with owner."
    required: false
    default: ${{ github.repository }}
  ref:
    description: "The branch, tag or SHA to checkout."
    required: false
    default: ""
  token:
    description: "Personal access token used to fetch the repository and for API calls."
    required: false
    default: ${{ github.token }}
  ssh-key:
    description: "SSH key used to fetch the repository."
    required: false
    default: ""
  ssh-known-hosts:
    description: "Known hosts in addition to the user and global host key database."
    required: false
    default: ""
  ssh-strict:
    description: "Whether to perform strict host key checking."
    required: false
    default: "true"
  ssh-user:
    description: "The user to use when connecting to the remote host."
    required: false
    default: "git"
  persist-credentials:
    description: "Whether to configure the token or SSH key with the local git config."
    required: false
    default: "true"
  path:
    description: "Relative path under $GITHUB_WORKSPACE to place the repository."
    required: false
    default: ""
  clean:
    description: "Whether to execute git clean -ffdx && git reset --hard HEAD before fetching."
    required: false
    default: "true"
  filter:
    description: "Partially clone against a given filter."
    required: false
    default: ""
  sparse-checkout:
    description: "Do a sparse checkout on given patterns."
    required: false
    default: ""
  sparse-checkout-cone-mode:
    description: "Specifies whether to use cone-mode when doing a sparse checkout."
    required: false
    default: "true"
  fetch-depth:
    description: "Number of commits to fetch. 0 indicates all history for all branches and tags."
    required: false
    default: "1"
  fetch-tags:
    description: "Whether to fetch tags, even if fetch-depth > 0."
    required: false
    default: "false"
  show-progress:
    description: "Whether to show progress status output when fetching."
    required: false
    default: "true"
  lfs:
    description: "Whether to download Git-LFS files."
    required: false
    default: "false"
  submodules:
    description: "Whether to checkout submodules: true to checkout submodules or recursive to recursively checkout submodules."
    required: false
    default: "false"
  set-safe-directory:
    description: "Add repository path as safe.directory for the runner user."
    required: false
    default: "true"
  github-server-url:
    description: "The base URL for the GitHub instance to clone from."
    required: false

outputs:
  base-ref:
    description: "Resolved base SHA for soll affected --base. Empty when soll is disabled."
    value: ${{ steps.soll-deepen.outputs.base-ref }}

runs:
  using: composite
  steps:
    # 1. Pre-checkout: determine the exact fetch-depth via GitHub compare API.
    #    Runs the node action *before* checkout so we can pass the computed
    #    depth to actions/checkout, eliminating a separate deepen round-trip.
    - if: inputs.soll == 'true'
      id: soll-plan
      shell: bash
      env:
        INPUT_TOKEN: ${{ inputs.token }}
      run: node "${{ github.action_path }}/dist/index.js"

    # 2. Checkout with computed depth (soll) or user-specified depth (plain).
    - if: inputs.checkout == 'true'
      uses: actions/checkout@v6
      with:
        repository: ${{ inputs.repository }}
        ref: ${{ inputs.ref }}
        token: ${{ inputs.token }}
        ssh-key: ${{ inputs.ssh-key }}
        ssh-known-hosts: ${{ inputs.ssh-known-hosts }}
        ssh-strict: ${{ inputs.ssh-strict }}
        ssh-user: ${{ inputs.ssh-user }}
        persist-credentials: ${{ inputs.persist-credentials }}
        path: ${{ inputs.path }}
        clean: ${{ inputs.clean }}
        filter: ${{ inputs.filter }}
        sparse-checkout: ${{ inputs.sparse-checkout }}
        sparse-checkout-cone-mode: ${{ inputs.sparse-checkout-cone-mode }}
        fetch-depth: ${{ steps.soll-plan.outputs.fetch-depth || inputs.fetch-depth }}
        fetch-tags: ${{ inputs.fetch-tags }}
        show-progress: ${{ inputs.show-progress }}
        lfs: ${{ inputs.lfs }}
        submodules: ${{ inputs.submodules }}
        set-safe-directory: ${{ inputs.set-safe-directory }}
        github-server-url: ${{ inputs.github-server-url }}

    # 3. Post-checkout: fetch the PR base ref and set the base-ref output.
    - if: inputs.soll == 'true'
      id: soll-deepen
      shell: bash
      working-directory: ${{ inputs.path || '.' }}
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          git fetch --no-tags "--depth=$(( ${{ steps.soll-plan.outputs.behind }} + 1 ))" origin "${{ steps.soll-plan.outputs.base-sha }}"
          echo "base-ref=${{ steps.soll-plan.outputs.base-sha }}" >> "$GITHUB_OUTPUT"
        else
          echo "base-ref=$(git rev-parse HEAD~1)" >> "$GITHUB_OUTPUT"
        fi
