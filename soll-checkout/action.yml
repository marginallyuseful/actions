name: "Soll Checkout"
description: "Shallow checkout with minimal fetch depth for soll. Outputs the base ref for soll affected --base."

inputs:
  ref:
    description: "Branch, tag, or SHA to check out (passthrough to actions/checkout)"
    required: false
  token:
    description: "Personal access token for checkout (passthrough to actions/checkout)"
    required: false
    default: ${{ github.token }}

outputs:
  base-ref:
    description: "Resolved base SHA for soll affected --base"
    value: ${{ steps.base.outputs.ref }}

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ inputs.ref }}
        token: ${{ inputs.token }}
        fetch-depth: 1

    - name: Fetch base ref
      id: base
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          # Fetch just the PR base commit so soll can tree-diff against it.
          git fetch --depth=1 origin "${{ github.event.pull_request.base.sha }}"
          echo "ref=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
        else
          # Push to main/default branch: deepen by 1 to get the parent commit.
          git fetch --deepen=1
          echo "ref=$(git rev-parse HEAD~1)" >> "$GITHUB_OUTPUT"
        fi
